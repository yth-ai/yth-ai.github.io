name: Deploy Maxwell to GitHub Pages

on:
  # 手动触发
  workflow_dispatch:
  # 定时触发：每天 UTC 2:00（北京 10:00）
  schedule:
    - cron: '0 2 * * *'
  # 推送到 main 分支时触发
  push:
    branches: [main]

# 设置 GITHUB_TOKEN 权限以允许部署到 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 仅允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Filter internal content
        run: node scripts/filter-public.mjs

      - name: Patch Astro config for GitHub Pages
        run: |
          sed -i "s|site: 'https://maxwell.woa.com'|site: 'https://yth-ai.github.io'|" astro.config.mjs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
